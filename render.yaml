services:
  - type: web
    name: comprog2-quiz-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    disk:
      name: quiz-db
      mountPath: /opt/render/project/src
      sizeGB: 1
